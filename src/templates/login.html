{% extends 'layout.html' %}
{% block content %}
<div class="container">
  <div class="row">
    <h1>Login</h1>
  </div>
</div>
<div class="container">
  <div class="row">
    <form action="/login.html" method="POST" class="box">
      <div class="col-auto">
        <label name="exampleFormControlInput1" class="form-label">Email address</label>
        <input name="email" type="email" class="form-control" id="exampleFormControlInput1" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2, 4}$" placeholder="name@example.com">
      </div>
      <div class="col-auto">
        <label for="exampleFormControlInput1" class="form-label">Password</label>
        <input name="password" type="password" class="form-control" id="exampleFormControlInput1">
      </div>
      <br/>
      <div class="col-auto">
        <button type="submit" class="btn btn-primary mb-3">Submit</button>
      </div>
      <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" />
    </form>
    <div>
      <a href="signup.html">Sign up instead?</a>
    </div>
  </div>
</div>
{% endblock %}
