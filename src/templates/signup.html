{% extends 'layout.html' %}
{% block content %}
<div class="container">
  <div class="row">
    <h1>Sign Up</h1>
  </div>
</div>
<div class="container">
  <div class="row">
    <form action="/signup.html" method="POST" class="box">
      <div class="col-auto">
        <label name="exampleFormControlInput1" class="form-label">Username</label>
        <input name="username" type="text" class="form-control" id="exampleFormControlInput1" pattern="[a-zA-Z0-9]{2,20}$" placeholder="myusername">
      </div>
      <div class="col-auto">
        <label name="exampleFormControlInput1" class="form-label">Email address</label>
        <input name="email" type="email" class="form-control" id="exampleFormControlInput1" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2, 4}$" placeholder="name@example.com">
      </div>
      <div class="col-auto">
        <label for="exampleFormControlInput1" class="form-label">Password</label>
        <input name="password" type="password" class="form-control" id="exampleFormControlInput1" pattern="">
      </div>
      <br/>
      <div class="col-auto">
        <button type="submit" class="btn btn-primary mb-3">Submit</button>
      </div>
      <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" />
    </form>
    <div>
      <a href="login.html">Login instead?</a>
    </div>
  </div>
</div>
{% endblock %}
